<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Umbra">
  <defs>
    <linearGradient id="uIri" x1="16" y1="10" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8ea2ff"/>
      <stop offset="34%" stop-color="#e79fd6"/>
      <stop offset="62%" stop-color="#63c8a0"/>
      <stop offset="100%" stop-color="#e6c06a"/>
    </linearGradient>
    <!-- carve an offset disc out of the main disc to form the crescent -->
    <mask id="uCut">
      <rect width="64" height="64" fill="black"/>
      <circle cx="32" cy="32" r="27" fill="white"/>
      <circle cx="44.5" cy="26" r="25" fill="black"/>
    </mask>
    <!-- a thinner offset for the iridescent inner limb -->
    <mask id="uLimb">
      <rect width="64" height="64" fill="black"/>
      <circle cx="32" cy="32" r="27" fill="white"/>
      <circle cx="42" cy="27.5" r="26" fill="black"/>
    </mask>
  </defs>
  <!-- ink crescent -->
  <g mask="url(#uCut)">
    <circle cx="32" cy="32" r="27" fill="#0d0d10"/>
  </g>
  <!-- iridescent inner limb -->
  <g mask="url(#uLimb)">
    <circle cx="32" cy="32" r="27" fill="url(#uIri)"/>
  </g>
</svg>
